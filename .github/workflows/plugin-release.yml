name: Release Obsidian plugin

# Tag convention matches Obsidian's own plugin template: a bare semver tag
# with no "v" prefix (e.g. "0.1.0"), so it never collides with the "v*"
# tags docker-publish.yml uses for server image releases.
on:
  push:
    tags: ["*.*.*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sync-core
        run: pnpm --filter @multiplayer-markdown/sync-core run build

      - name: Build plugin
        run: pnpm --filter @multiplayer-markdown/plugin run build

      # Catches the case where someone tags a release without bumping
      # manifest.json first — BRAT compares the tag against this file to
      # detect updates, so a mismatch here would silently confuse it.
      - name: Verify tag matches manifest.json version
        run: |
          MANIFEST_VERSION=$(node -p "require('./packages/plugin/manifest.json').version")
          if [ "$MANIFEST_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi

      # The required-files list is defined exactly ONCE here and reused for
      # both the existence check and the actual upload below — structurally
      # impossible for "what we check" and "what we ship" to drift apart
      # again. (This is what silently omitted styles.css before: the old
      # static `files:` list in this workflow was a second, independent copy
      # of "what should ship" that nobody kept in sync with reality.)
      - name: Verify required plugin assets exist
        run: |
          REQUIRED_FILES="packages/plugin/main.js packages/plugin/manifest.json packages/plugin/styles.css"
          for f in $REQUIRED_FILES; do
            if [ ! -f "$f" ]; then
              echo "Required release asset is missing: $f"
              exit 1
            fi
          done
          echo "REQUIRED_FILES=$REQUIRED_FILES" >> "$GITHUB_ENV"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" $REQUIRED_FILES \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}"
